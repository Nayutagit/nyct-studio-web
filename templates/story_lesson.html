<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
    <title>Chocolat musique Lesson Availability</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap');

        :root {
            --text-main: #343a40;
            --text-light: #6c757d;
            --accent-studio: #4ea8de;
            /* Blueish for Studio */
            --accent-online: #f7a072;
            /* Orange for Online */
            --bg-base: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 160px 0 0 0;
            width: 1080px;
            height: 1920px;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
        }

        /* Abstract soft shapes for background */
        .bg-shape-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 600px;
            height: 600px;
            background: rgba(78, 168, 222, 0.15);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
        }

        .bg-shape-2 {
            position: absolute;
            bottom: 300px;
            right: -100px;
            width: 800px;
            height: 800px;
            background: rgba(247, 160, 114, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .container {
            width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 5;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .main-header {
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .date-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 100px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1;
        }

        .weekday {
            font-size: 60px;
            color: var(--text-light);
            margin-left: 10px;
        }

        .avail-text {
            font-size: 40px;
            font-weight: 500;
            color: var(--text-light);
            margin-top: 20px;
            letter-spacing: 0.1em;
        }

        .time-slots {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
        }

        .slot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border-radius: 25px;
            padding: 20px 40px;
            min-width: 500px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s;
        }

        .slot-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 700;
        }

        .slot-badge {
            font-size: 24px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 30px;
            letter-spacing: 0.05em;
        }

        .badge-studio {
            color: #fff;
            background: var(--accent-studio);
        }

        .badge-online {
            color: #fff;
            background: var(--accent-online);
        }

        .no-slots {
            font-size: 40px;
            color: var(--text-light);
            text-align: center;
            padding: 60px;
            font-weight: 300;
        }

        .legend {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            font-size: 24px;
            color: var(--text-light);
            z-index: 5;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .dot-studio {
            background: var(--accent-studio);
        }

        .dot-online {
            background: var(--accent-online);
        }

        .booking-prompt {
            font-family: 'Noto Serif JP', serif;
            font-size: 45px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: auto;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.05em;
            z-index: 5;
        }

        .weekly-summary {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .weekly-header {
            font-size: 35px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 10px;
        }

        .weekly-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .weekly-row {
            display: flex;
            justify-content: space-between;
            width: 80%;
            font-size: 40px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        .weekly-date {
            color: var(--text-main);
        }

        .weekly-status {
            font-weight: 700;
            font-size: 50px;
            line-height: 1;
            width: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-studio { color: var(--accent-studio); font-size: 55px; }
        .status-online { color: var(--accent-online); font-size: 55px; }
        .status-busy { color: #dc3545; font-size: 65px; opacity: 0.9; }
    </style>
</head>

<body>
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>

    <div class="container" id="schedule-container">
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="dot dot-studio"></div><span>: スタジオ or オンライン可能</span>
        </div>
        <div class="legend-item">
            <div class="dot dot-online"></div><span>: オンラインのみ</span>
        </div>
    </div>
    <div class="booking-prompt">スケジュール詳細・予約はこちら↓</div>
    <div style="height: 250px; width: 100%;"></div>
</body>

</html>
