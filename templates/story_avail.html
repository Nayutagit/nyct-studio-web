<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
    <title>Chocolat musique Availability</title>
    <style>
        /* Import Elegant Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap');

        :root {
            --text-color: #4a4a4a;
            /* Dark Charcoal */
            --accent-color: #d4af37;
            /* Gold */
            --bg-base: #fffaf0;
            /* Floral White */
        }

        body {
            margin: 0;
            padding: 160px 0 0 0;
            width: 1080px;
            height: 1920px;
            background-color: var(--bg-base);
            background-blend-mode: multiply;

            color: var(--text-color);
            font-family: 'Noto Serif JP', serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .decorative-border {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 40px;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            /* Reduced gap */
            z-index: 5;
        }

        .main-header {
            text-align: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .date-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 90px;
            /* Reduced */
            font-weight: 600;
            color: var(--text-color);
            line-height: 1.2;
            display: block;
        }

        .date-text span.weekday {
            font-size: 65px;
            /* Reduced */
            color: #777;
            margin-left: 10px;
        }

        .avail-text {
            font-family: 'Noto Serif JP', serif;
            font-size: 55px;
            /* Reduced */
            font-weight: 700;
            color: var(--text-color);
            margin-top: 10px;
            letter-spacing: 0.1em;
            display: block;
            border-bottom: 2px solid rgba(212, 175, 55, 0.4);
            padding-bottom: 20px;
            display: inline-block;
        }

        .room-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: 45px;
            /* Reduced */
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: -10px;
            text-align: center;
            letter-spacing: 0.1em;
        }

        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            /* Reduced */
            justify-content: center;
            width: 100%;
        }

        .slot {
            font-family: 'Cormorant Garamond', serif;
            background: #fff;
            border: 2px solid var(--accent-color);
            color: var(--text-color);
            border-radius: 50px;
            padding: 15px 30px;
            min-width: 300px;
            font-size: 44px;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .no-slots {
            font-size: 48px;
            opacity: 0.6;
            text-align: center;
            padding: 40px;
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            width: 100%;
        }

        .booking-prompt {
            font-family: 'Noto Serif JP', serif;
            font-size: 45px;
            font-weight: 700;
            color: var(--text-color);
            margin-top: auto;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.05em;
        }


        .weekly-summary {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .weekly-header {
            font-family: 'Noto Serif JP', serif;
            font-size: 35px;
            font-weight: 700;
            color: var(--text-color);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .weekly-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .weekly-row {
            display: flex;
            justify-content: space-between;
            width: 80%;
            font-size: 40px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        .weekly-date {
            color: var(--text-color);
        }

        .weekly-status {
            font-weight: 700;
            font-size: 50px;
            line-height: 1;
            width: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-o { color: #4CAF50; font-size: 55px; }
        .status-tri { color: #FF9800; font-size: 55px; }
        .status-x { color: #F44336; font-size: 65px; opacity: 0.9; }
    </style>
</head>

<body>
    <div class="decorative-border"></div>

    <div class="container" id="schedule-container">
    </div>

    <div class="booking-prompt">スケジュール詳細・予約はこちら↓</div>
    <div style="height: 250px; width: 100%;"></div>
</body>

</html>
