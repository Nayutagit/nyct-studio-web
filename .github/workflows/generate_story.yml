name: Generate and Upload Instagram Story

on:
  schedule:
    # 17:00 JST is 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libcups2 libxkbcommon-x11-0 libxcomposite1 libxrandr2 libxdamage1 libpango-1.0-0 libcairo2 libasound2

      - name: Generate Story Image
        env:
          OUTPUT_DIR: _output
        run: |
          mkdir -p _output
          node scripts/generate_insta_story.js

      - name: Upload to Google Drive
        env:
          OUTPUT_DIR: _output
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node scripts/upload_to_drive.js
